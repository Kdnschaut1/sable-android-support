package dev.sableandroid;

import net.neoforged.bus.api.IEventBus;
import net.neoforged.fml.common.Mod;
import org.slf4j.Logger;
import org.slf4j.LoggerFactory;

@Mod(SableAndroid.MOD_ID)
public class SableAndroid {

    public static final String MOD_ID = "sable_android";
    public static final Logger LOGGER = LoggerFactory.getLogger("SableAndroid");
    public static final TickThrottleConfig THROTTLE_CONFIG = new TickThrottleConfig();

    public SableAndroid(IEventBus modEventBus) {
        THROTTLE_CONFIG.loadOrCreate();
        LOGGER.info("[SableAndroid] Sable Android Support mod loaded.");
        if (isAndroid()) {
            LOGGER.info("[SableAndroid] Android environment confirmed. Rapier native interception active.");
            LOGGER.info("[SableAndroid] Tick throttle patches active for {} classes.", THROTTLE_CONFIG.getAll().size());
        } else {
            LOGGER.info("[SableAndroid] Not on Android - tick patches still active (set all values to 1 to disable).");
        }
    }

    public static boolean isAndroid() {
        String osVersion = System.getProperty("os.version", "").toLowerCase();
        String javaVendor = System.getProperty("java.vendor", "").toLowerCase();
        String javaVmName = System.getProperty("java.vm.name", "").toLowerCase();
        if (osVersion.contains("android")) return true;
        if (javaVendor.contains("android")) return true;
        if (javaVmName.contains("android")) return true;
        try { Class.forName("android.os.Build"); return true; } catch (ClassNotFoundException ignored) {}
        return false;
    }
}
