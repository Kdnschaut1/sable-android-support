name: Build SableBridge

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Make Gradle Executable
      run: chmod +x gradlew

    - name: Extract Project Versions
      id: get_versions
      run: |
        MOD_VER=$(grep 'mod_version' gradle.properties | cut -d'=' -f2 | xargs)
        MC_VER=$(grep 'minecraft_version' gradle.properties | cut -d'=' -f2 | xargs)
        echo "MOD_VERSION=$MOD_VER" >> $GITHUB_ENV
        echo "MC_VERSION=$MC_VER" >> $GITHUB_ENV

    - name: Build with Gradle
      run: ./gradlew build

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sablebridge-${{ env.MOD_VERSION }}-${{ env.MC_VERSION }}
        path: build/libs/*.jar
